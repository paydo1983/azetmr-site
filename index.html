<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에즈금융서비스 ETMR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#f0f4f8;--card:#fff;--text:#1a202c;--sub:#64748b;
      --border:#e2e8f0;--primary:#2563eb;--primary-light:#dbeafe;
      --chrome:#4285f4;--edge:#0078d4;
      --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.06);
    }
    body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.5}

    /* === HEADER === */
    .header{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
    .header-inner{max-width:1200px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
    .logo-area{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .logo-area span{font-weight:800;font-size:18px}
    .logo-area small{color:var(--sub);font-weight:400;font-size:12px}
    .header-links{display:flex;gap:8px}
    .header-links a{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;text-decoration:none;border:1px solid var(--border);color:var(--sub);transition:.15s}
    .header-links a:hover{border-color:var(--primary);color:var(--primary)}
    .header-links a.primary{background:var(--primary);color:#fff;border-color:var(--primary)}

    /* === HERO === */
    .hero{background:linear-gradient(135deg,#1e3a5f,#2563eb 60%,#3b82f6);padding:40px 20px;text-align:center;color:#fff}
    .hero h1{font-size:26px;font-weight:800;margin-bottom:6px}
    .hero p{font-size:14px;opacity:.85;margin-bottom:20px}
    .search-wrap{max-width:480px;margin:0 auto;position:relative}
    .search-wrap input{width:100%;padding:13px 44px 13px 18px;border:none;border-radius:50px;font-size:14px;font-family:inherit;background:rgba(255,255,255,.95);outline:none;box-shadow:0 4px 16px rgba(0,0,0,.12)}
    .search-wrap input::placeholder{color:#94a3b8}
    .search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--primary)}

    /* === BROWSER LEGEND === */
    .legend{display:flex;justify-content:center;gap:20px;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border)}
    .legend-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--sub)}
    .legend-dot{width:10px;height:10px;border-radius:50%}
    .legend-dot.chrome{background:var(--chrome)}
    .legend-dot.edge{background:var(--edge)}

    /* === TABS === */
    .tabs{position:sticky;top:52px;z-index:90;background:#fff;border-bottom:1px solid var(--border)}
    .tabs-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;gap:0;overflow-x:auto;scrollbar-width:none}
    .tabs-inner::-webkit-scrollbar{display:none}
    .tab{padding:12px 20px;font-size:14px;font-weight:500;color:var(--sub);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap;transition:.15s}
    .tab:hover{color:var(--text)}
    .tab.active{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
    .tab .badge{font-size:11px;font-weight:700;background:var(--primary-light);color:var(--primary);padding:1px 7px;border-radius:10px;margin-left:4px}
    .tab.active .badge{background:var(--primary);color:#fff}

    /* === MAIN === */
    .main{max-width:1200px;margin:0 auto;padding:24px 20px}
    .section{display:none}
    .section.active{display:block}

    /* === CARD GRID === */
    .card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}

    /* === COMPANY CARD === */
    .company-card{
      background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
      padding:16px 12px;text-align:center;cursor:pointer;position:relative;
      transition:all .2s;display:flex;flex-direction:column;align-items:center;
    }
    .company-card:hover{box-shadow:0 6px 20px rgba(0,0,0,.08);transform:translateY(-2px);border-color:#cbd5e1}
    .company-card.open{border-color:var(--primary);box-shadow:0 6px 20px rgba(37,99,235,.12)}

    /* Browser indicator dot */
    .browser-dot{
      position:absolute;top:8px;left:8px;width:12px;height:12px;border-radius:50%;
      border:2px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.15);
    }
    .browser-dot.chrome{background:var(--chrome)}
    .browser-dot.edge{background:var(--edge)}

    /* Logo */
    .card-logo{width:100%;height:56px;display:flex;align-items:center;justify-content:center;margin-bottom:8px}
    .card-logo img{max-width:120px;max-height:48px;object-fit:contain}
    .card-logo .fallback{font-size:14px;font-weight:700;color:var(--text)}

    /* Name */
    .card-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
    .card-phone{font-size:11px;color:var(--sub);margin-bottom:8px}

    /* Open button */
    .card-link{
      display:inline-flex;align-items:center;gap:4px;
      padding:6px 14px;border-radius:8px;font-size:12px;font-weight:600;
      text-decoration:none;transition:.15s;
    }
    .card-link.chrome-link{background:#e8f0fe;color:var(--chrome)}
    .card-link.chrome-link:hover{background:#4285f4;color:#fff}
    .card-link.edge-link{background:#e3f2fd;color:var(--edge)}
    .card-link.edge-link:hover{background:#0078d4;color:#fff}

    /* Expand area */
    .card-detail{display:none;width:100%;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);text-align:left}
    .company-card.open .card-detail{display:block}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
    .detail-label{color:var(--sub)}
    .detail-value{font-weight:500}
    .detail-value a{color:var(--primary);text-decoration:none}
    .detail-value a:hover{text-decoration:underline}

    /* More button */
    .more-btn{
      border:none;background:none;color:var(--sub);cursor:pointer;font-size:16px;
      padding:2px 6px;border-radius:4px;transition:.15s;margin-top:4px;
    }
    .more-btn:hover{background:var(--primary-light);color:var(--primary)}

    /* === LINKS SECTION === */
    .links-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
    .link-card{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;text-decoration:none;color:var(--text);transition:.15s}
    .link-card:hover{border-color:var(--primary);background:var(--primary-light)}
    .link-icon{font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:var(--bg);border-radius:8px;flex-shrink:0}
    .link-text{font-size:13px;font-weight:500}

    /* === NO RESULTS === */
    .no-results{display:none;text-align:center;padding:40px;color:var(--sub)}
    .no-results.show{display:block}

    /* === SCROLL TOP === */
    .scroll-top{position:fixed;bottom:20px;right:20px;width:40px;height:40px;background:var(--primary);color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:50}
    .scroll-top.show{display:flex}

    /* === FOOTER === */
    .footer{text-align:center;padding:24px;color:var(--sub);font-size:12px;border-top:1px solid var(--border);margin-top:32px}

    /* === RESPONSIVE === */
    @media(max-width:640px){
      .header-links{display:none}
      .hero h1{font-size:20px}
      .card-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}
      .company-card{padding:12px 8px}
      .card-logo img{max-height:36px}
      .links-grid{grid-template-columns:1fr}
      .tab{padding:10px 14px;font-size:13px}
    }
  </style>
</head>

// ====== RENDER ======
function renderCard(d, i) {
  const bc = d.b === 'edge' ? 'edge' : 'chrome';
  const lc = d.b === 'edge' ? 'edge-link' : 'chrome-link';
  const bLabel = d.b === 'edge' ? 'Edge' : 'Chrome';
  return `<div class="company-card" id="card-${i}" data-name="${d.n}" data-cat="${d.c}">
    <div class="browser-dot ${bc}" title="${bLabel} 전용"></div>
    <div class="card-logo">
      <img src="${d.logo}" alt="${d.n}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=fallback>${d.n}</div>'">
    </div>
    <div class="card-name">${d.n}</div>
    <div class="card-phone">${d.tel}</div>
    <a class="card-link ${lc}" href="${d.l}" target="_blank" rel="noopener" onclick="event.stopPropagation()">
      ${bLabel}로 열기 &#8594;
    </a>
    <button class="more-btn" onclick="event.stopPropagation();toggleCard(${i})" title="상세정보">&#8943;</button>
    <div class="card-detail">
      ${d.incall && d.incall !== '-' ? `<div class="detail-row"><span class="detail-label">인콜모니터링</span><span class="detail-value">${d.incall}</span></div>` : ''}
      ${d.help && d.help !== '-' ? `<div class="detail-row"><span class="detail-label">전산헬프데스크</span><span class="detail-value">${d.help}</span></div>` : ''}
      ${d.fax && d.fax !== '-' ? `<div class="detail-row"><span class="detail-label">팩스</span><span class="detail-value">${d.fax}</span></div>` : ''}
    </div>
  </div>`;
}

function toggleCard(i) {
  document.getElementById('card-' + i).classList.toggle('open');
}

// ====== TABS ======
let currentTab = 'damage';
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === 'sec-' + tab));
  filter();
}

// ====== SEARCH ======
document.getElementById('search').addEventListener('input', filter);
function filter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  ['damage','life','mutual','digital'].forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    const nr = document.getElementById('nr-' + cat);
    let vis = 0;
    grid.querySelectorAll('.company-card').forEach(c => {
      const match = !q || c.dataset.name.toLowerCase().includes(q);
      c.style.display = match ? '' : 'none';
      if (match) vis++;
    });
    nr.classList.toggle('show', vis === 0 && q.length > 0);
  });
  // Auto-switch tab if no results in current
  if (q) {
    const cats = ['damage','life','mutual','digital'];
    const cur = document.querySelectorAll('#grid-' + currentTab + ' .company-card:not([style*="none"])').length;
    if (cur === 0) {
      for (const cat of cats) {
        if (document.querySelectorAll('#grid-' + cat + ' .company-card:not([style*="none"])').length > 0) {
          switchTab(cat); break;
        }
      }
    }
  }
}

// ====== SCROLL TOP ======
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('show', window.scrollY > 300);
}, {passive: true});

// ====== INIT ======
['damage','life','mutual','digital'].forEach(cat => {
  document.getElementById('grid-' + cat).innerHTML = C.filter(d => d.c === cat).map((d,i) => renderCard(d, C.indexOf(d))).join('');
});

<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --primary-light: #dbeafe;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #0f172a;
      --text-secondary: #64748b;
      --border: #e2e8f0;
      --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== HEADER ===== */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
    }
    .logo img { height: 36px; }
    .logo-text { font-weight: 700; font-size: 18px; }
    .logo-sub { font-size: 12px; color: var(--text-secondary); font-weight: 400; }

    .header-actions {
      display: flex;
      gap: 8px;
    }
    .header-btn {
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      background: white;
    }
    .header-btn:hover { border-color: var(--primary); color: var(--primary); }
    .header-btn.primary {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }
    .header-btn.primary:hover { background: var(--primary-dark); }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 50%, #3b82f6 100%);
      padding: 48px 24px 40px;
      color: white;
      text-align: center;
    }
    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .hero p {
      font-size: 15px;
      opacity: 0.85;
      margin-bottom: 24px;
    }

    /* Search */
    .search-container {
      max-width: 560px;
      margin: 0 auto 24px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 14px 48px 14px 20px;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-family: inherit;
      background: rgba(255,255,255,0.95);
      color: var(--text);
      outline: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .search-input::placeholder { color: #94a3b8; }
    .search-icon {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--primary);
      font-size: 20px;
      pointer-events: none;
    }

    /* Quick CTA */
    .quick-links {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .quick-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 50px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .quick-link:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.4);
    }

    /* ===== TABS ===== */
    .tabs-container {
      position: sticky;
      top: 64px;
      z-index: 90;
      background: white;
      border-bottom: 1px solid var(--border);
    }
    .tabs {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      gap: 0;
      overflow-x: auto;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 14px 24px;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: all 0.15s;
      user-select: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      font-weight: 600;
    }
    .tab .badge {
      display: inline-block;
      background: var(--primary-light);
      color: var(--primary);
      font-size: 11px;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      margin-left: 6px;
    }
    .tab.active .badge {
      background: var(--primary);
      color: white;
    }

    /* ===== MAIN CONTENT ===== */
    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }

    /* ===== COMPANY CARD ===== */
    .company-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
    }
    .company-card:hover {
      box-shadow: var(--shadow-lg);
      border-color: #cbd5e1;
      transform: translateY(-1px);
    }
    .company-card.expanded {
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    .card-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .card-logo {
      height: 32px;
      max-width: 180px;
      object-fit: contain;
    }
    .card-toggle {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: var(--bg);
      color: var(--text-secondary);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    .company-card.expanded .card-toggle {
      background: var(--primary-light);
      color: var(--primary);
      transform: rotate(180deg);
    }

    .card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    .company-card.expanded .card-body {
      max-height: 600px;
    }

    .card-content {
      padding: 0 20px 20px;
    }

    .info-section {
      margin-bottom: 12px;
    }
    .info-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }
    .info-label {
      font-size: 13px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .info-value {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }
    .info-value.link {
      color: var(--primary);
      cursor: pointer;
    }
    .info-value.link:hover {
      text-decoration: underline;
    }
    .info-value.phone {
      font-variant-numeric: tabular-nums;
    }

    .tool-buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .tool-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
      transition: all 0.15s;
    }
    .tool-btn:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }
    .tool-btn img {
      width: 16px;
      height: 16px;
    }
    .tool-icon {
      font-size: 14px;
    }

    /* ===== 영업모음 Section ===== */
    .sales-section {
      margin-top: 8px;
    }
    .sales-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .sales-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      text-decoration: none;
      color: var(--text);
      transition: all 0.15s;
    }
    .sales-item:hover {
      border-color: var(--primary);
      background: var(--primary-light);
    }
    .sales-icon {
      font-size: 20px;
      flex-shrink: 0;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      border-radius: var(--radius-sm);
    }
    .sales-text {
      font-size: 13px;
      font-weight: 500;
    }

    /* ===== FOOTER ===== */
    .footer {
      text-align: center;
      padding: 32px 24px;
      color: var(--text-secondary);
      font-size: 13px;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* ===== NO RESULTS ===== */
    .no-results {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-secondary);
    }
    .no-results-icon { font-size: 48px; margin-bottom: 12px; }
    .no-results-text { font-size: 15px; }

    /* ===== SCROLL TO TOP ===== */
    .scroll-top {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 44px;
      height: 44px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-lg);
      transition: all 0.2s;
      z-index: 50;
    }
    .scroll-top:hover { background: var(--primary-dark); transform: scale(1.05); }
    .scroll-top.visible { display: flex; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .header-inner { padding: 0 16px; }
      .header-actions { display: none; }
      .hero { padding: 32px 16px 28px; }
      .hero h1 { font-size: 22px; }
      .main { padding: 16px; }
      .cards-grid { grid-template-columns: 1fr; gap: 12px; }
      .sales-grid { grid-template-columns: 1fr; }
      .tab { padding: 12px 16px; font-size: 13px; }
      .quick-links { gap: 8px; }
      .quick-link { font-size: 12px; padding: 6px 14px; }
    }

    /* ===== ANIMATION ===== */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .company-card {
      animation: fadeIn 0.3s ease forwards;
    }
  </style>
</head>

  { text: "건강보험공단", icon: "🏥", href: "https://www.nhis.or.kr/" },
  { text: "국민건강보험 요양기관 현황", icon: "🏥", href: "https://www.nhis.or.kr/" }
];

// ===== SEARCH INDEX =====
const searchIndex = {};
for (const [section, companies] of Object.entries(companyData)) {
  companies.forEach((company, idx) => {
    const keywords = [
      company.name.toLowerCase(),
      ...company.contacts.map(c => c.value.toLowerCase()),
    ].join(' ');
    if (!searchIndex[section]) searchIndex[section] = [];
    searchIndex[section].push({ idx, keywords, name: company.name });
  });
}

// ===== RENDER =====
let currentTab = '손해보험';

function renderCards(filter = '') {
  const grid = document.getElementById('companyGrid');
  const salesSection = document.getElementById('salesSection');
  const noResults = document.getElementById('noResults');

  if (currentTab === '영업모음') {
    grid.style.display = 'none';
    salesSection.style.display = 'block';
    noResults.style.display = 'none';
    renderSales(filter);
    return;
  }

  grid.style.display = 'grid';
  salesSection.style.display = 'none';

  const companies = companyData[currentTab] || [];
  let filtered = companies;

  if (filter) {
    const q = filter.toLowerCase();
    filtered = companies.filter(c => {
      const searchable = [
        c.name,
        ...c.contacts.map(ct => ct.label + ct.value),
        ...c.tools.map(t => t.label + (t.value||''))
      ].join(' ').toLowerCase();
      return searchable.includes(q);
    });
  }

  if (filtered.length === 0) {
    grid.innerHTML = '';
    noResults.style.display = 'block';
    return;
  }

  noResults.style.display = 'none';

  grid.innerHTML = filtered.map((company, i) => `
    <div class="company-card" data-index="${i}" style="animation-delay: ${i * 0.04}s">
      <div class="card-header" onclick="toggleCard(this)">
        <a href="${company.logoLink}" target="_blank" onclick="event.stopPropagation()">
          <img class="card-logo" src="${company.logo}" alt="${company.name}" onerror="this.parentElement.innerHTML='<span style=font-weight:600;font-size:16px>${company.name}</span>'">
        </a>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:12px;color:var(--text-secondary)">${company.contacts.find(c=>c.label==='고객센터')?.value || ''}</span>
          <div class="card-toggle">▼</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-content">
          <div class="info-section">
            <div class="info-section-title">연락처</div>
            ${company.contacts.map(c => `
              <div class="info-row">
                <span class="info-label">${c.label}</span>
                ${c.type === 'phone' ? `<a href="tel:${c.value.replace(/-/g,'')}" class="info-value phone">${c.value}</a>` :
                  c.type === 'link' ? `<a href="${c.href}" target="_blank" class="info-value link">${c.value} →</a>` :
                  `<span class="info-value">${c.value}</span>`}
              </div>
            `).join('')}
          </div>
          ${company.tools.length > 0 ? `
          <div class="info-section">
            <div class="info-section-title">영업지원 도구</div>
            ${company.tools.filter(t => t.type === 'phone').map(t => `
              <div class="info-row">
                <span class="info-label">${t.label}</span>
                <a href="tel:${t.value.replace(/-/g,'')}" class="info-value phone">${t.value}</a>
              </div>
            `).join('')}
            <div class="tool-buttons">
              ${company.tools.filter(t => t.href).map(t => `
                <a href="${t.href}" target="_blank" class="tool-btn">
                  <span class="tool-icon">${t.icon || '🔗'}</span>
                  ${t.label}
                </a>
              `).join('')}
            </div>
          </div>
          ` : ''}
        </div>
      </div>
    </div>
  `).join('');
}

function renderSales(filter = '') {
  const grid = document.getElementById('salesGrid');
  let items = salesData;
  if (filter) {
    const q = filter.toLowerCase();
    items = salesData.filter(s => s.text.toLowerCase().includes(q));
  }
  grid.innerHTML = items.map(item => `
    <a href="${item.href}" target="_blank" class="sales-item">
      <div class="sales-icon">${item.icon}</div>
      <span class="sales-text">${item.text}</span>
    </a>
  `).join('');
}

function toggleCard(header) {
  const card = header.closest('.company-card');
  card.classList.toggle('expanded');
}

// ===== TAB SWITCHING =====
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentTab = tab.dataset.tab;
    document.getElementById('searchInput').value = '';
    renderCards();
  });
});

// ===== SEARCH =====
let searchTimeout;
document.getElementById('searchInput').addEventListener('input', (e) => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    const q = e.target.value.trim();
    if (q) {
      // Search across all tabs
      let found = false;
      for (const [section, companies] of Object.entries(companyData)) {
        const matches = companies.filter(c => {
          const searchable = [c.name, ...c.contacts.map(ct => ct.value)].join(' ').toLowerCase();
          return searchable.includes(q.toLowerCase());
        });
        if (matches.length > 0 && !found) {
          // Switch to the tab with results
          currentTab = section;
          document.querySelectorAll('.tab').forEach(t => {
            t.classList.toggle('active', t.dataset.tab === section);
          });
          found = true;
        }
      }
    }
    renderCards(q);
  }, 200);
});

// ===== SCROLL TO TOP =====
window.addEventListener('scroll', () => {
  document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 400);
});

// ===== INIT =====
renderCards();
</script>

</body>
</html>
